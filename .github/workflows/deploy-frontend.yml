name: 🚀 Deploy Frontend to S3 (watermarking-data-security-lmu)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for deployment (e.g., hotfix, new feature, initial deploy)"
        required: true
        default: "Manual deployment trigger"

jobs:
  deploy:
    runs-on: ubuntu-latest

    # 💡 IMPORTANT: Set the default working directory for all subsequent 'run' steps
    defaults:
      run:
        working-directory: frontend/

    steps:
      # 1. Checkout the repository code
      - name: ⬇️ Checkout repository code
        uses: actions/checkout@v4

      # 2. Setup Node.js Environment (using Node 22)
      - name: ⚙️ Setup Node.js v22
        uses: actions/setup-node@v4
        with:
          node-version: "22" # Using the specific version you requested

      # 3. Install dependencies and build the React app
      # This step runs inside the 'frontend/' directory due to 'defaults' above
      - name: 🏗️ Install dependencies and build
        run: |
          npm install
          npm run build # This command creates the 'frontend/build/' folder
        env:
          CI: false

      # 4. Configure AWS Credentials
      - name: 🔑 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }} # 'eu-central-1'

      # 5. Deploy the build output to S3
      - name: ⬆️ Deploy to S3 Static Hosting
        run: |
          # We use './build' here, which resolves to 'frontend/build' because of 
          # the 'working-directory: frontend/' default setting.
          aws s3 sync ./build s3://${{ secrets.AWS_S3_BUCKET }} --delete
